version: '3.9'

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: saloonify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  service-user:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx ts-node Services/service-user/src/index.ts"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/saloonify
      PORT: '50051'
      PROTO_PATH: /app/proto
      NODE_ENV: development
    ports:
      - '50051:50051'
    depends_on:
      postgres:
        condition: service_healthy

  service-salon:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx ts-node Services/service-salon/src/index.ts"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/saloonify
      REDIS_URL: redis://redis:6379
      PORT: '50052'
      PROTO_PATH: /app/proto
      NODE_ENV: development
    ports:
      - '50052:50052'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-booking:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx ts-node Services/service-booking/src/index.ts"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/saloonify
      REDIS_URL: redis://redis:6379
      PORT: '50053'
      PROTO_PATH: /app/proto
      NODE_ENV: development
    ports:
      - '50053:50053'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-review:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx ts-node Services/service-review/src/index.ts"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/saloonify
      REDIS_URL: redis://redis:6379
      PORT: '50054'
      PROTO_PATH: /app/proto
      NODE_ENV: development
    ports:
      - '50054:50054'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/packages/api-gateway/public/uploads
    command: sh -c "npm install && npx ts-node packages/api-gateway/src/index.ts"
    environment:
      PORT: '3000'
      USER_SERVICE_HOST: service-user:50051
      SALON_SERVICE_HOST: service-salon:50052
      BOOKING_SERVICE_HOST: service-booking:50053
      REVIEW_SERVICE_HOST: service-review:50054
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_REFRESH_SECRET: super_secret_refresh_key_change_in_production
      CORS_ORIGINS: http://localhost:5173
      UPLOAD_DIR: /app/packages/api-gateway/public/uploads
      PROTO_PATH: /app/proto
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      - service-user
      - service-salon
      - service-booking
      - service-review

  client:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app/packages/client
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/client/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_GRAPHQL_URL: http://localhost:3000/graphql
    ports:
      - '5173:5173'
    depends_on:
      - api-gateway

  db-migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma migrate deploy --schema=prisma/schema.prisma"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/saloonify
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
  redis_data:
  uploads_data:
